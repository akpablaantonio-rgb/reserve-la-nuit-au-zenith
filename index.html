<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Nuit au Zénith - Accueil</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="home">
    <div id="loader">
        <div class="loader-content">
            <div class="spinner"></div>
            <p>Chargement...</p>
        </div>
    </div>
    <div class="parallax-bg">
        <div class="particles"></div>
        <div class="bubbles"></div>
    </div>
    <header>
        <h1 class="main-title">LA NUIT AU ZÉNITH</h1>
        <p class="subtitle">Une soirée d’ambiance et de découverte</p>
    </header>
    <main>
        <section class="contact-section">
            <h2>Contact Organisateur</h2>
            <p>+228 97 99 55 83<br>+228 71 14 40 34</p>
            <button class="btn whatsapp-btn" onclick="openContactWhatsApp()">Contacter-nous</button>
        </section>
        <section class="reservation-section">
            <h2>Réserver votre place</h2>
            <form id="reservation-form">
                <div class="form-group">
                    <label for="name">Nom complet</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="phone">Numéro de téléphone</label>
                    <input type="tel" id="phone" name="phone" required>
                </div>
                <button type="submit" class="btn reserve-btn">Réserver maintenant</button>
            </form>
            <button type="button" class="btn menu-btn" onclick="openMenuPage()">Voir le menu</button>
        </section>
            </main>
    <script src="script.js"></script>
</body>
</html>
